<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Calculadora de IMC</h2>
        <p>Insira seus dados para descobrir o seu Índice de Massa Corporal.</p>
        
        <div class="input-group">
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" step="0.1" placeholder="Ex: 70.5">
        </div>

        <div class="input-group">
            <label for="altura">Altura (metros):</label>
            <input type="number" id="altura" step="0.01" placeholder="Ex: 1.75">
        </div>

        <button onclick="calcularIMC()">Calcular IMC</button>

        <div id="resultado" class="resultado-box hidden">
            <h3 id="imc-valor"></h3>
            <p id="imc-classificacao"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
