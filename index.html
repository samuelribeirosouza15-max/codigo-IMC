<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC Avançada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Calculadora de IMC</h2>
        <p class="subtitulo">Descubra sua classificação de saúde e veja recomendações</p>
        
        <div class="input-group">
            <label for="peso">Peso (kg)</label>
            <input type="number" id="peso" step="0.1" placeholder="Digite seu peso. Ex: 72.5">
        </div>

        <div class="input-group">
            <label for="altura">Altura (metros)</label>
            <input type="number" id="altura" step="0.01" placeholder="Digite sua altura. Ex: 1.75">
        </div>

        <div class="botoes-grupo">
            <button class="btn-calcular" onclick="calcularIMC()">Calcular IMC</button>
            <button class="btn-limpar" onclick="limparCampos()">Limpar</button>
        </div>

        <div id="resultado" class="resultado-box hidden">
            <p class="label-resultado">Seu resultado:</p>
            <h3 id="imc-valor">0.00</h3>
            <div id="imc-badge" class="badge">Classificação</div>
            <p id="imc-dica" class="dica-texto"></p>
        </div>

        <div class="tabela-referencia">
            <h4>Tabela de Referência (OMS)</h4>
            <div class="linha-tabela azul"><span>Abaixo de 18.5</span> <span>Abaixo do peso</span></div>
            <div class="linha-tabela verde"><span>18.5 até 24.9</span> <span>Peso ideal</span></div>
            <div class="linha-tabela laranja"><span>25.0 até 29.9</span> <span>Levemente acima</span></div>
            <div class="linha-tabela vermelho"><span>30.0 ou mais</span> <span>Obesidade</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
